name: publish

# Publishes lazarus-bio to PyPI when you cut a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens are stored anywhere.
#
# One-time setup (see docs/PUBLISHING.md):
#   1. On PyPI, add a "pending publisher" for project `lazarus-bio`:
#        owner=DoctorDean, repo=lazarus, workflow=publish.yml, environment=pypi
#   2. Create a GitHub environment named `pypi` (Settings → Environments).
#   3. Cut a Release whose tag matches the version in pyproject.toml (e.g. v0.1.0).

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
