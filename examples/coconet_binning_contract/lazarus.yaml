name: coconet_binning
repo_url: https://github.com/Puumanamana/CoCoNet
base_image: ghcr.io/doctordean/lazarus-coconet:working
entrypoint: "#!/bin/bash\nset -euo pipefail\n# $INPUT is a directory containing assembly.fasta\
  \ plus one or more *.bam (with .bai) files.\n# $OUTDIR is where CoCoNet writes its\
  \ results (bins_*.csv is the headline output).\nmkdir -p \"$OUTDIR\"\ncoconet run\
  \ \\\n  --fasta \"$INPUT\"/assembly.fasta \\\n  --bam \"$INPUT\"/*.bam \\\n  --output\
  \ \"$OUTDIR\" \\\n  --threads 1 \\\n  --n-train 64 --n-test 8 --batch-size 2 --min-prevalence\
  \ 0 \\\n  --test-ratio 0.2 --n-frags 5 \\\n  --compo-neurons 8 4 --cover-neurons\
  \ 8 4 --cover-kernel 2 --wsize 2 --wstep 2\necho \"Bins written to:\"; ls \"$OUTDIR\"\
  /bins_*.csv"
inputs:
- name: INPUT
  type: directory
  description: Directory with assembled viral contigs (assembly.fasta) and per-sample
    coordinate-sorted, indexed read-coverage BAMs (*.bam + *.bai)
outputs:
- name: bins_*.csv
  type: csv
  description: Headerless contig->cluster assignment (contig_name,cluster_id), one
    row per input contig
smoke:
  description: Run coconet on the bundled tests/sim_data (9 viral contigs + 2 BAMs)
    with smoke-test hyperparameters and count assigned contigs
  command: cd /workspace/repo && rm -rf output_test && coconet run --fasta tests/sim_data/assembly.fasta
    --bam tests/sim_data/*.bam --output output_test --threads 1 --n-train 64 --n-test
    8 --batch-size 2 --min-prevalence 0 --test-ratio 0.2 --n-frags 5 --compo-neurons
    8 4 --cover-neurons 8 4 --cover-kernel 2 --wsize 2 --wstep 2 >/dev/null 2>&1;
    echo n_contigs_assigned=$(cat output_test/bins_*.csv | wc -l)
  metric: n_contigs_assigned
  threshold: 9
  input_ref: tests/sim_data
benchmark: null
paper: ''
commit: master (v1.1.0, snapshot 2021-10)
patches:
- 'coconet/core/composition_feature.py: replace removed NumPy alias np.unicode with
  the ''U'' dtype code in np.fromiter(seq, (''U'', 1)) so it runs on NumPy >=1.24'
platform: linux/amd64
gpus: ''
