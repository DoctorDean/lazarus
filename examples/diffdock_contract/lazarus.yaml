name: diffdock_blind_docking
repo_url: https://github.com/gcorso/DiffDock
base_image: ghcr.io/doctordean/lazarus-diffdock:site-ready
entrypoint: "set -euo pipefail\ncd /home/appuser/DiffDock\n# INPUT: a DiffDock CSV\
  \ (columns: complex_name,protein_path,ligand_description,protein_sequence).\n# \
  \  protein_path = path to a receptor PDB; ligand_description = a SMILES string OR\
  \ a path to an SDF/MOL2 ligand.\n#   (Blind docking: DiffDock randomizes the ligand\
  \ position, so no binding site is required.)\n# OUTPUT: $OUTDIR/<complex_name>/rank1.sdf\
  \ ... rankN.sdf  plus rankK_confidence<score>.sdf (ranked by confidence).\nmkdir\
  \ -p \"$OUTDIR\"\n/home/appuser/bin/micromamba run -n diffdock python inference.py\
  \ \\\n  --config default_inference_args.yaml \\\n  --protein_ligand_csv \"$INPUT\"\
  \ \\\n  --out_dir \"$OUTDIR\" \\\n  --model_dir ./workdir/v1.1/score_model \\\n\
  \  --confidence_model_dir ./workdir/v1.1/confidence_model \\\n  --samples_per_complex\
  \ 10\necho \"Ranked poses written to $OUTDIR/<complex_name>/rank1.sdf .. rank10.sdf\
  \ (confidence in rankK_confidence*.sdf filenames)\""
inputs:
- name: INPUT
  type: file
  description: DiffDock CSV with columns complex_name,protein_path,ligand_description,protein_sequence.
    protein_path points to a receptor PDB; ligand_description is a SMILES string or
    a path to an SDF/MOL2 ligand file. One row per complex.
outputs:
- name: ranked_poses
  type: directory
  description: "$OUTDIR/<complex_name>/rank1.sdf .. rank10.sdf \u2014 the confidence-ranked\
    \ predicted ligand poses in the input protein's coordinate frame. rank1.sdf is\
    \ the top-1 pose; rankK_confidence<score>.sdf encodes each pose's confidence score\
    \ in its filename."
smoke:
  description: "Blind-dock a representative complex DiffDock-L docks well (6MOA, ligand\
    \ JW4) from receptor PDB + ligand SMILES, then assert the TOP-1 pose reproduces\
    \ the crystal ligand with symmetry-corrected heavy-atom RMSD < 2.0 A (DiffDock's\
    \ own success criterion; lower is better \u2014 PASSES when below 2.0). Uses the\
    \ repo's own utils.molecules_utils.get_symmetry_rmsd. Measured RMSD = 0.336 A\
    \ (also 0.35/0.63/0.38 A across repeat runs), confidence ~ +0.45."
  command: /home/appuser/bin/micromamba run -n diffdock python /home/appuser/DiffDock/lazarus_smoke.py
  metric: rmsd
  threshold: 2
  input_ref: cached 6MOA receptor PDB + JW4 crystal ligand SDF (prepared from RCSB)
    baked into the image at /home/appuser/DiffDock/lazarus_bench/6moa/
benchmark:
  description: DiffDock-L top-1 success rate (fraction of complexes with top-1 pose
    RMSD < 2.0 A) on the repo's own PDBBind test set. Reported ~38-43%. On an 8-complex
    sample drawn from data/testset_csv.csv, 3/8 top-1 poses were < 2.0 A (6moa 0.34,
    6e4c 1.56, 6jsn 1.70), consistent with the reported rate; confidence tracked RMSD
    (positive-confidence poses were the accurate ones).
  metric: top1_success_rate_rmsd_lt_2A
  reported: 0.4
  tolerance: 0.15
  n: 8
  source: DiffDock / DiffDock-L (ICLR 2023 + 2024 update); repo data/testset_csv.csv
  command: micromamba run -n diffdock python inference.py --protein_ligand_csv lazarus_bench/batch.csv
    --out_dir OUT --model_dir ./workdir/v1.1/score_model --confidence_model_dir ./workdir/v1.1/confidence_model
    --samples_per_complex 10; then lazarus_eval_batch.py
  measured: 0.375
paper: 'Corso et al., "DiffDock: Diffusion Steps, Twists, and Turns for Molecular
  Docking" (ICLR 2023); DiffDock-L (v1.1) weights.'
commit: ''
patches:
- 'Added lazarus_prep.py: fetches an RCSB PDB, writes an ATOM-only receptor PDB, extracts
  the crystal ligand instance and assigns correct bond orders from the CCD ideal-SDF
  template (RDKit AssignBondOrdersFromTemplate) to produce a ground-truth ligand SDF.'
- 'Added lazarus_rmsd.py / lazarus_eval_batch.py: compute symmetry-corrected top-1
  heavy-atom RMSD vs the crystal ligand via the repo''s own get_symmetry_rmsd, using
  its two-molecule graph-isomorphism form so SMILES-derived predicted poses and crystal
  ligands need not share atom ordering.'
- "Added lazarus_smoke.py: self-contained TRUTHFUL sanity check \u2014 docks 6MOA/JW4\
  \ and asserts top-1 RMSD < 2.0 A (exit 0 iff BELOW 2.0), replacing the previous\
  \ meaningless inverted 'RMSD >= 2.0' check on the hard 1a0q example."
- No source patches to DiffDock itself were needed; inference stack was already revived
  in the base image.
platform: linux/amd64
gpus: all
