name: sequoya_nsgaii_msa
repo_url: https://github.com/benhid/Sequoya
base_image: lazarus/sequoya:nsgaii-ready
entrypoint: "set -euo pipefail\ncd /root/repo\n\n# INPUT is a BAliBASE .tfa file,\
  \ e.g. resources/bb3_release/RV11/BB11001.tfa\n# The BAliBASE loader needs the resources\
  \ ROOT (the dir that contains both\n# bb3_release/ and bb3_aligned/), plus the instance\
  \ name (basename minus .tfa).\nINPUT=\"${INPUT:-}\"\nOUTDIR=\"${OUTDIR:-/tmp/out}\"\
  \nMAX_EVALUATIONS=\"${MAX_EVALUATIONS:-3000}\"\nmkdir -p \"$OUTDIR\"\n\nif [ -n\
  \ \"$INPUT\" ] && [ -f \"$INPUT\" ]; then\n  INSTANCE=\"$(basename \"$INPUT\" .tfa)\"\
  \n  # .../resources/bb3_release/RV11/BB11001.tfa  -> resources root is three dirs\
  \ up\n  RESROOT=\"$(cd \"$(dirname \"$INPUT\")/../..\" && pwd)\"\nelse\n  # Fall\
  \ back to the shipped BB11001 instance baked into the image.\n  INSTANCE=\"BB11001\"\
  \n  RESROOT=\"/root/repo/resources\"\nfi\n\necho \"Running NSGA-II MSA optimization:\
  \ instance=$INSTANCE resources=$RESROOT max_evaluations=$MAX_EVALUATIONS\"\npython\
  \ /root/repo/examples/nsgaii_bb11001.py \"$INSTANCE\" \"$RESROOT\" \"$MAX_EVALUATIONS\"\
  \ \\\n  2> \"$OUTDIR/${INSTANCE}_run.log\" \\\n  | tee \"$OUTDIR/${INSTANCE}_pareto_front.txt\""
inputs:
- name: INPUT
  type: file
  description: A BAliBASE .tfa file of unaligned sequences (e.g. resources/bb3_release/RV11/BB11001.tfa).
    Its resources root must also contain bb3_aligned/RVxx with >=2 precomputed alignments
    for the same instance. Omit to use the shipped BB11001.
outputs:
- name: ${INSTANCE}_pareto_front.txt
  type: file
  description: Initial precomputed-alignment population objectives, the final NSGA-II
    Pareto front objectives (raw SumOfPairs and %TotallyConservedColumns per solution),
    and the sum_of_pairs_delta_vs_initial summary.
smoke:
  description: Run non-distributed NSGA-II (pop=100, offspring=100, SPXMSA crossover,
    ShiftClosedGapGroups mutation, 3000 evaluations) on the shipped BB11001 and confirm
    the final Pareto front is non-empty and its best SumOfPairs did not degrade vs
    the initial precomputed-alignment population.
  command: cd /root/repo && python examples/nsgaii_bb11001.py BB11001 resources 3000
    2>/dev/null | grep sum_of_pairs_delta_vs_initial
  metric: sum_of_pairs_delta_vs_initial
  threshold: 0
  input_ref: ''
benchmark:
  description: Best SumOfPairs of the final NSGA-II Pareto front minus the best SumOfPairs
    of the initial precomputed-alignment population on BAliBASE BB11001; >=0 proves
    the metaheuristic ran end-to-end without degrading the alignment.
  metric: sum_of_pairs_delta_vs_initial
  reported: 0
  tolerance: 0
  n: 1
  source: Sequoya revival sanity check (target delta >= 0.0)
  command: ''
  measured: 25
paper: "Ben\xEDtez-Hidalgo et al., Sequoya: Multiobjective Multiple Sequence Alignment\
  \ in Python"
commit: HEAD (shallow clone, 2020-era master)
patches:
- 'Installed genuine jmetalpy 1.5.3 from the jMetal/jMetalPy git tag v1.5.3 instead
  of the PyPI jmetalpy==1.5.4 wheel: the current PyPI 1.5.4 artifact is mislabeled
  and actually ships 1.6.0-era code (Problem became an ABC with number_of_objectives()
  as abstract methods and Requires-Python>=3.7), which is incompatible with Sequoya''s
  attribute-based Problem API on Python 3.6. v1.5.3 restores the old attribute API
  Sequoya was written against.'
- 'Pinned heavy deps to Python-3.6 wheels (numpy==1.19.5, scipy==1.5.4, pandas==1.1.5,
  matplotlib==3.3.4, statsmodels==0.12.2, plotly==4.14.3) with --only-binary=:all:
  to stop pip from resolving scipy to a 30MB source tarball (scipy 1.18) that cannot
  build on 3.6.'
- 'Added examples/nsgaii_bb11001.py adapted from examples/nsgaii.py: BAliBASE(instance=''BB11001'',
  path=''resources''); removed VisualizerObserver/ProgressBarObserver and all Plot/MSAPlot
  GUI calls; reduced max_evaluations to 3000; prints initial precomputed-population
  best SumOfPairs and final Pareto-front objectives + delta.'
- 'Fixed jmetalpy API drift: StoppingByEvaluations takes max as a positional/`max=`
  arg in 1.5.3 (not max_evaluations=).'
- pip install --no-deps -e . so `sequoya` is importable when running a script from
  examples/ (script dir, not repo root, is on sys.path).
platform: linux/amd64
gpus: ''
