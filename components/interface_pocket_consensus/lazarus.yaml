name: interface_pocket_consensus
repo_url: (Lazarus adapter)
base_image: python:3.11-slim
entrypoint: "set -euo pipefail\npip install --quiet numpy >/dev/null 2>&1 || pip install\
  \ --quiet --break-system-packages numpy >/dev/null 2>&1\nmkdir -p \"$OUTDIR\"\n\
  python - <<'PY'\nimport os, csv, json\nimport numpy as np\n\ndef get(d, *keys, default=None):\n\
  \    for k in keys:\n        if k in d: return d[k]\n    return default\n\n# ScanNet:\
  \ per-residue CSV\nscannet = {}\nwith open(os.environ[\"scannet\"]) as f:\n    for\
  \ row in csv.DictReader(f):\n        if row.get(\"Chain\", \"A\").strip() == \"\
  A\":\n            scannet[int(row[\"Residue Index\"])] = float(row[\"Binding site\
  \ probability\"])\n\n# dMaSIF: per-residue npy (ids + scores)\nd_ids = np.load(os.environ[\"\
  dmasif_ids\"])\nd_scores = np.load(os.environ[\"dmasif_scores\"])\ndmasif = {int(r):\
  \ float(s) for r, s in zip(d_ids, d_scores)}\n\n# fpocket: pockets.json -> per-residue\
  \ best druggability over ANY pocket\npockets = json.load(open(os.environ[\"pockets\"\
  ]))\nif isinstance(pockets, dict):\n    pockets = get(pockets, \"pockets\", default=[])\n\
  DRUG = 0.5\npocket_res = {}\npocket_list = []\nfor p in pockets:\n    score = float(get(p,\
  \ \"druggability\", \"drug_score\", \"druggability_score\", default=0) or 0)\n \
  \   resids_p = []\n    for r in get(p, \"lining_residues\", \"residues\", \"resids\"\
  , default=[]) or []:\n        try:\n            resids_p.append(int(r))\n      \
  \  except (ValueError, TypeError):\n            pass\n    pocket_list.append((get(p,\
  \ \"rank\", \"pocket\", default=len(pocket_list) + 1), score, len(resids_p)))\n\
  \    for rid in resids_p:\n        pocket_res[rid] = max(pocket_res.get(rid, 0.0),\
  \ score)\nn_drug_pockets = sum(1 for _, s, _ in pocket_list if s >= DRUG)\ntop_drug\
  \ = max((s for _, s, _ in pocket_list), default=0.0)\n\n# per-residue consensus\n\
  resids = sorted(set(scannet) | set(dmasif))\nrows = []\nfor r in resids:\n    sn,\
  \ dm = scannet.get(r), dmasif.get(r)\n    vals = [x for x in (sn, dm) if x is not\
  \ None]\n    site = float(np.mean(vals)) if vals else 0.0\n    pd = pocket_res.get(r,\
  \ 0.0)\n    rows.append((r, sn, dm, site, pd >= DRUG, pd))\nrows.sort(key=lambda\
  \ x: -x[3])\n\nout = os.environ[\"OUTDIR\"]\nwith open(os.path.join(out, \"triage.csv\"\
  ), \"w\", newline=\"\") as f:\n    w = csv.writer(f)\n    w.writerow([\"resid\"\
  , \"scannet\", \"dmasif\", \"consensus_site\", \"in_druggable_pocket\", \"pocket_druggability\"\
  ])\n    for row in rows:\n        w.writerow([\"\" if v is None else v for v in\
  \ row])\n\niface = [r for r in rows if r[3] >= 0.5]\niface_pocket = [r for r in\
  \ iface if r[5] > 0]\nhot = [r for r in iface if r[4]]\nwith open(os.path.join(out,\
  \ \"summary.txt\"), \"w\") as f:\n    f.write(\"Binder-interface triage\\n\")\n\
  \    f.write(\"=======================\\n\")\n    f.write(f\"residues scored (ScanNet\
  \ + dMaSIF consensus) : {len(rows)}\\n\")\n    f.write(f\"predicted interface residues\
  \ (consensus >= 0.5): {len(iface)}\\n\")\n    f.write(\"  top: \" + \", \".join(str(r[0])\
  \ for r in iface[:12]) + \"\\n\")\n    f.write(f\"fpocket pockets found: {len(pockets)}\
  \ (top druggability {top_drug:.2f})\\n\")\n    f.write(f\"interface residues that\
  \ coincide with a pocket : {len(iface_pocket)}\"\n            f\" (max pocket druggability\
  \ {max((r[5] for r in iface_pocket), default=0):.2f})\\n\")\n    f.write(f\"HOT\
  \ small-molecule targets (interface AND druggability >= {DRUG}): {len(hot)}\\n\\\
  n\")\n    if hot:\n        f.write(\"=> Candidate druggable small-molecule site(s)\
  \ at the interface:\\n\")\n        for r in hot[:20]:\n            f.write(f\" \
  \    resid {r[0]:>4}: site={r[3]:.2f}  pocket_druggability={r[5]:.2f}\\n\")\n  \
  \  else:\n        f.write(\"=> The interface is clearly localized but is NOT a druggable\
  \ small-molecule\\n\"\n                \"   pocket (top druggability {:.2f} < {:.1f}).\
  \ This is the signature of a flat\\n\"\n                \"   protein-protein interface\
  \ -> an antibody / biologic target, not a small\\n\"\n                \"   molecule\
  \ one.\\n\".format(top_drug, DRUG))\nprint(f\"triage_residues={len(rows)} pockets={len(pockets)}\
  \ interface={len(iface)} hot={len(hot)}\")\nPY\n"
inputs:
- name: scannet
  type: file
  description: ScanNet per-residue CSV
- name: dmasif_scores
  type: file
  description: dMaSIF per-residue scores .npy
- name: dmasif_ids
  type: file
  description: dMaSIF per-residue ids .npy
- name: pockets
  type: file
  description: fpocket pockets.json
outputs:
- name: triage.csv
  type: file
  description: per-residue consensus site score + druggable-pocket flag
- name: summary.txt
  type: file
  description: human-readable triage summary + druggability verdict
smoke: null
paper: "Lazarus adapter \u2014 fuses site predictions (ScanNet+dMaSIF) with fpocket\
  \ druggability"
commit: ''
patches: []
platform: linux/amd64
gpus: ''
