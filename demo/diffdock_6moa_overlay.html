<script>
  const T = (id) => document.getElementById(id).textContent;
  const v = $3Dmol.createViewer('viewer', { backgroundColor: '0x070b0a', antialias: true });

  // receptor — muted translucent cartoon so the pocket reads without stealing focus
  v.addModel(T('protein'), 'pdb');
  v.setStyle({ model: 0 }, { cartoon: { color: '#2f4d47', opacity: 0.5 } });

  // crystal ligand (experimental) — green
  v.addModel(T('crystal'), 'sdf');
  v.setStyle({ model: 1 }, { stick: { colorscheme: 'greenCarbon', radius: 0.17 } });

  // DiffDock rank-1 pose — magenta
  v.addModel(T('rank1'), 'sdf');
  v.setStyle({ model: 2 }, { stick: { colorscheme: 'magentaCarbon', radius: 0.17 } });

  // frame on the pocket (the two near-superimposed ligands) and spin gently for b-roll
  v.zoomTo({ model: 1 });
  v.zoom(1.7);
  v.spin('y', 0.5);
  v.render();
</script>
